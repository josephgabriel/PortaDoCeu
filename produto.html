<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="phone">
        <header style="flex-direction: row; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" style="text-decoration: none; color: #ff8758; font-weight: bold; font-size: 16px;">← Voltar</a>
            <img src="img/logo.png" class="logo" alt="Logo" style="width: 50px;">
            <div style="width: 50px;"></div> </header>

        <div id="detalhe-produto" style="padding: 20px;">
            </div>
    </div>

    <script src="js/produtos.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 1. Pega o ID da URL (ex: ?id=2)
            const urlParams = new URLSearchParams(window.location.search);
            const idProduto = parseInt(urlParams.get('id'));

            // 2. Encontra o produto no array do seu produtos.js
            const produto = produtos.find(p => p.id === idProduto);

            const container = document.getElementById("detalhe-produto");

            if (!produto) {
                container.innerHTML = "<h2>Produto não encontrado!</h2><a href='index.html'>Voltar para a loja</a>";
                return;
            }

            // 3. Configura a mensagem automática do WhatsApp
            const numeroWhatsapp = "558899075923"; // Substitua pelo número real do cliente (com DDD)
            const textoMensagem = `Olá! Gostaria de encomendar o produto: *${produto.nome}* no valor de R$ ${produto.preco.toFixed(2).replace('.', ',')}.`;
            // EncodeURIComponent serve para transformar espaços e acentos em um formato aceito em URLs
            const linkWhatsapp = `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(textoMensagem)}`;

            // 4. Injeta o HTML com os detalhes e o botão customizado
            container.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <img src="${produto.imagem}" alt="${produto.nome}" onerror="this.src='https://placehold.co/300x300?text=${encodeURIComponent(produto.nome)}'" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                </div>
                
                <h1 style="color: #444; font-size: 22px; margin-bottom: 10px;">${produto.nome}</h1>
                <p style="color: #ff8758; font-size: 28px; font-weight: bold; margin-bottom: 20px;">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
                
                <p style="color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 30px;">
                    Lindo ícone religioso perfeito para presentear ou decorar seu altar de devoção. Feito com materiais de excelente qualidade.
                </p>

                <a href="${linkWhatsapp}" target="_blank" style="display: flex; align-items: center; justify-content: center; background: #25D366; color: white; text-decoration: none; padding: 15px; border-radius: 30px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 12px rgba(37,211,102,0.3); transition: 0.25s;">
                    Pedir pelo WhatsApp
                </a>
            `;
        });
    </script>
</body>
</html>
